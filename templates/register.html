{% extends "base.html" %}
{% block title %}Register – Shift Planner{% endblock %}
{% block content %}

<div class="container">
    <h1>Register</h1>
    <form method="POST" action="/">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="Felder">
            <div class="Eintrag">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter a username" value="{{ user_name|default('')|e }}">
            </div>
            <div class="Eintrag">
                <label>Email</label>
                <input type="email" name="email" placeholder="yourmail@example.com">
            </div>
            <div class="Eintragen">
                <button type="submit" class="button">Register</button>
            </div>
        </div>
        {% if error_message %}
        <p class="error">{{ error_message|e }}</p>
        {% elif good_message %}
        <p class="good">{{good_message|e }}</p>
        {% endif %}
    </form>
    <p><a href="/login">Already have an account? Login</a></p>
</div>
{% endblock %}
