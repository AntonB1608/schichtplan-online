{% extends "base.html" %}
{% block title %}Login – Shift Planner{% endblock %}
{% block content %}
<div class="container">
    <h1>Login</h1>
    <form method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="Felder">
            <div class="Eintrag">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" value="{{ username|default('')|e }}">
            </div>
            <div class="Eintrag">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password">
            </div>
            <div class="Eintragen">
                <button type="submit" class="button">Login</button>
            </div>
        </div>
        {% if error_message %}
        <p class="error">{{ error_message|e }}</p>
        {% elif good_message %}
        <p class="good">{{good_message|e }}</p>
        {% endif %}
    </form>
    <p><a href="/">No account yet? Register</a></p>
</div>
{% endblock %}
