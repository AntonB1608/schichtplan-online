<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  
</head>
<body>
<div class="container">
    <b><h1>Schichtplantool</h1></b>
    <form method="POST" action="/schicht">
        <div class = "Felder">
            <div class="Eintrag">
                <label>
                    Datum:
                </label>
                <input type="date" name="datum">
            </div>
            <div class="Eintrag">
                <label>
                    Schicht Anfang
                </label>
                <input type="time" name="zeit_anfang">
            </div>
            <div class = "Eintrag">
                <label> 
                    Schicht Ende
                </label>
                <input type="time" name="zeit_ende">
            </div>
            <div class = "Eintrag">
                <label> 
                    Freier Tag
                </label>
                <input type="checkbox" name="frei"> 
            </div>
            <div class="Eintrag">
                <label></label>
                <button type="submit" class="button">Eintragen</button>
            </div>
    </form>
</div>
</body>

</html>
